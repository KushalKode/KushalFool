<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Kushal </title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(to right,#141e30,#243b55);
      color:white;
      min-height:100vh;
      padding:30px;
    }

    .container{
      max-width:900px;
      margin:auto;
      background: rgba(255,255,255,0.08);
      padding:25px;
      border-radius:15px;
      backdrop-filter: blur(8px);
      box-shadow:0 0 20px rgba(0,0,0,0.3);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#ffd369;
    }

    textarea{
      width:100%;
      height:180px;
      padding:15px;
      border:none;
      border-radius:10px;
      resize:none;
      font-size:16px;
      margin-top:10px;
      outline:none;
    }

    .buttons{
      display:flex;
      gap:15px;
      margin-top:20px;
      flex-wrap:wrap;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:8px;
      background:#ffd369;
      color:black;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
      background:white;
    }

    .output{
      margin-top:25px;
      background:white;
      color:black;
      padding:20px;
      border-radius:10px;
      min-height:100px;
      line-height:1.8;
    }

    .comment-section{
      margin-top:40px;
    }

    .comment-section h2{
      margin-bottom:15px;
      color:#ffd369;
    }

    .comment-input{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .comment-input input{
      flex:1;
      padding:12px;
      border:none;
      border-radius:8px;
      outline:none;
    }

    .comments{
      margin-top:20px;
    }

    .comment{
      background:white;
      color:black;
      padding:15px;
      border-radius:10px;
      margin-bottom:10px;
    }

    .question{
      margin-bottom:15px;
      font-size:18px;
      color:#fff;
    }

    @media(max-width:600px){
      .comment-input{
        flex-direction:column;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>I am very Nervous.</h1>

    <label>Hello YE WEBSITE MENE BANAYA HA PLZZ 🥹:</label>

    <textarea id="bioInput" placeholder="Write about yourself here..."></textarea>

    <div class="buttons">
      <button onclick="translateHindi()">Translate to Hindi</button>
      <button onclick="translateHinglish()">Translate to Hinglish</button>
      <button onclick="showOriginal()">Original</button>
    </div>

    <div class="output" id="outputBox">
      PLzzz Click on TRANSLATE TO HINGLISH / HINDI...
    </div>

    <div class="comment-section">

      <div class="question">
        ❓ Only like a friend because STUDY is Important ......
      </div>

      <div class="comment-input">
        <input type="text" id="commentInput" placeholder="Write your comment..." />
        <button onclick="addComment()">Post Comment</button>
      </div>

      <div class="comments" id="commentsBox"></div>

    </div>

  </div>

    function showOriginal() {
      document.getElementById("outputBox").innerHTML =
        document.getElementById("bioInput").value;
    }

    function addComment() {

      let commentInput = document.getElementById("commentInput");

      let commentText = commentInput.value;

      if(commentText.trim() === ""){
        alert("Please write a comment");
        return;
      }

      let commentDiv = document.createElement("div");

      commentDiv.classList.add("comment");

      commentDiv.innerHTML = `
        <strong>User:</strong><br>
        ${commentText}
      `;

      document.getElementById("commentsBox").prepend(commentDiv);

      commentInput.value = "";
    }
  </script>

</body>
</html>
